# Phase 1 (Step 1) baseline configuration
quarkus.http.port=8080

# OpenAPI + Swagger UI (useful during development)
quarkus.swagger-ui.always-include=true

# Health endpoint is provided by the smallrye-health extension at:
#   /q/health


# =========================
# Step 2 — PostgreSQL connectivity + Dev Services
# =========================

# In dev, Quarkus Dev Services can auto-start PostgreSQL (requires Docker).
# If you prefer a manually managed local Postgres, use docker-compose.dev.yml (see README)
# and set quarkus.datasource.jdbc.url accordingly.

%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=modeller
%dev.quarkus.datasource.password=modeller

# Let Quarkus manage a Postgres container automatically in dev if no JDBC URL is set.
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.db-name=modeller
%dev.quarkus.datasource.devservices.image-name=postgres:16

# Production-style config (examples; override via env vars or config in your deploy)
# %prod.quarkus.datasource.jdbc.url=jdbc:postgresql://<host>:5432/modeller
# %prod.quarkus.datasource.username=${DB_USERNAME}
# %prod.quarkus.datasource.password=${DB_PASSWORD}

# Tests in Step 1/2 do not require a database yet. Disable JDBC in test profile to avoid
# requiring Docker/local Postgres before we introduce DB-backed integration tests.
%test.quarkus.datasource.jdbc=false


# =========================
# Step 3 — Flyway baseline
# =========================

# Flyway scripts live in classpath:db/migration by convention.
# Enable migrate-at-start in dev so a fresh DB gets initialized automatically.
quarkus.flyway.locations=db/migration
quarkus.flyway.migrate-at-start=false
%dev.quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.enabled=false
# --- Hibernate ORM (Step 4) ---
quarkus.hibernate-orm.database.generation=none
%dev.quarkus.hibernate-orm.validate-in-dev-mode=true

# Keep tests DB-free for Steps 1-4; we’ll add DB-backed tests later.
%test.quarkus.hibernate-orm.enabled=false
