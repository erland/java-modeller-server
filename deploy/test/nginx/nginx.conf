server {
  listen 80;
  server_name _;

  # Runtime config served by the edge (no rebuild of the PWA image required)
  location = /pwa-modeller/config.json {
    default_type application/json;
    add_header Cache-Control "no-store";
    alias /etc/nginx/pwa-modeller/config.json;
  }

  # ---- PWA (static container image) ----
  # Proxy /pwa-modeller/ to the PWA container. We preserve the /pwa-modeller prefix so that
  # apps built with base "/pwa-modeller/" work correctly.
  location /pwa-modeller/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass http://pwa:80;
  }

  # ---- Quarkus API ----
  # ---- SSE (dataset ops stream) ----
  # SSE connections are long-lived and must not be buffered by nginx.
  # Also, in regex locations nginx forbids a URI part in proxy_pass, so we rewrite /api/* -> /*.
  location ~* ^/api/datasets/[^/]+/ops/stream$ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Accept-Encoding "";

    proxy_buffering off;
    proxy_cache off;
    gzip off;
    chunked_transfer_encoding on;
    add_header X-Accel-Buffering no;
    add_header Cache-Control "no-cache";

    # Keep the stream alive even when idle.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://server:8080;
  }

  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    proxy_pass http://server:8080/;
  }

  # ---- Keycloak ----
  # Keycloak runs with http-relative-path=/auth, so we preserve the prefix when proxying.
  location /auth/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass http://keycloak:8080;
  }
}
