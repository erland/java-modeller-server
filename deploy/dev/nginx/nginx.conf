server {
  listen 80;
  server_name _;

  # ---- PWA (Vite dev server) ----
  # Proxies requests under /pwa-modeller/ to the local dev server running on the host (default Vite port 5173).
  # IMPORTANT: Your Vite app should be configured to use base "/pwa-modeller/" (as it is on GitHub Pages).
  location /pwa-modeller/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket / HMR support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_pass http://host.docker.internal:5173;
  }


  # Vite dev server uses absolute paths for HMR/runtime endpoints (e.g. /@vite/client, /@react-refresh, /src/*).
  # When the app is mounted under /pwa-modeller/, proxy those root-level dev endpoints to Vite as well.
  location ^~ /@vite/ {
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://host.docker.internal:5173;
  }

  location = /@react-refresh {
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://host.docker.internal:5173;
  }

  location ^~ /src/ {
    proxy_set_header Host $host;
    proxy_pass http://host.docker.internal:5173;
  }

  location = /manifest.webmanifest {
    proxy_set_header Host $host;
    proxy_pass http://host.docker.internal:5173;
  }

  location ^~ /icons/ {
    proxy_set_header Host $host;
    proxy_pass http://host.docker.internal:5173;
  }

  # Common Vite dev assets
  location = /vite.svg {
    proxy_set_header Host $host;
    proxy_pass http://host.docker.internal:5173;
  }



  # Vite may also request optimized deps and client env under /node_modules/ and filesystem paths under /@fs/ or /@id/.
  location ^~ /node_modules/ {
    proxy_set_header Host $host;
    proxy_pass http://host.docker.internal:5173;
  }

  location ^~ /@fs/ {
    proxy_set_header Host $host;
    proxy_pass http://host.docker.internal:5173;
  }

  location ^~ /@id/ {
    proxy_set_header Host $host;
    proxy_pass http://host.docker.internal:5173;
  }

  location = /__vite_ping {
    proxy_set_header Host $host;
    proxy_pass http://host.docker.internal:5173;
  }
  # Runtime config served by the edge (no rebuild of the PWA image required)
  location = /pwa-modeller/config.json {
    default_type application/json;
    add_header Cache-Control "no-store";
    alias /etc/nginx/pwa-modeller/config.json;
  }

  # ---- Quarkus API ----
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://host.docker.internal:8080/;
  }

  # ---- Keycloak ----
  location /auth/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Keycloak is mounted under /auth; keep the prefix when proxying
    proxy_pass http://keycloak:8080;
  }
}
